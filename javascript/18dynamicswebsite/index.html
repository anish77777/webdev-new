<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Card Creator</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100vh;
            border: 2px solid black;
            position: relative;
            background-color: rgb(141, 129, 129);
        }

        .card {
            display: flex;
            flex-direction: row;
            flex-wrap: nowrap;
            border: 2px solid black;
            width: 100%;
            height: 20%;
            overflow: hidden;
            column-gap: 10px;
            align-items: center;
            justify-content: flex-start;
        }

        .thumbnail {
            aspect-ratio: 16/9;
            border: 2px solid rgb(46, 44, 44);
            overflow: hidden;
            width: 250px;

            position: relative;
        }



        img {
            position: relative;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .duration {
            position: absolute;
            bottom: 10px;
            right: 10px;
            z-index: 5;
            background-color: black;
            color: aliceblue;
        }

        .card-titles {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: flex-start;
            align-self: flex-start;
            /* This is your 'individual exception' */
            overflow: hidden;
            gap: 2px;
            margin: 0px;
        }



        .cardheader h1 {
            font-size: 1.2rem;
            margin: 0px;
            padding: 0px;
        }

        .cn_v_date {
            font-size: 0.9rem;
            color: #444;
            display: flex;
            gap: 5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Cards will be injected here by scripts.js -->
    </div>
    <script src="scripts.js"></script>
</body>

</html>
