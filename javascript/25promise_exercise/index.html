<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promise Script Loader</title>
</head>

<body>
    <h1>Promise Script Loader</h1>
    <p>Check the console and wait for the alert.</p>

    <script>
        const loadScript = (src) => {
            return new Promise((resolve, reject) => {
                let script = document.createElement("script");
                script.src = src;

                script.onload = () => {
                    resolve(src);
                };

                script.onerror = () => {
                    reject(new Error(`Failed to load script: ${src}`));
                };

                document.body.appendChild(script);
            });
        };

        // Using async/await
        async function runLoader() {
            try {
                const src = await loadScript("test.js");
                console.log(`Success: ${src} is ready.`);
                alert("Script loaded successfully using async/await!");
            } catch (err) {
                console.error(err);
                alert("Error loading script!");
            }
        }

        runLoader();
    </script>
</body>

</html>
