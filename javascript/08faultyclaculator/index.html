<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Faulty Calculator</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }

      .container {
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 300px;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
      }

      .input-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 5px;
        color: #555;
        font-weight: bold;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        border: 2px solid #ddd;
        border-radius: 5px;
        font-size: 16px;
        box-sizing: border-box;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #667eea;
        background-color: #f5f5ff;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: white;
        border: none;
        border-radius: 5px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      button:hover {
        background: #764ba2;
      }

      button:active {
        transform: scale(0.98);
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        background: #f0f0f0;
        border-radius: 5px;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        color: #333;
        min-height: 30px;
      }

      .warning {
        color: #ff6b6b;
        font-size: 12px;
        margin-top: 10px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🧮 Faulty Calculator</h1>

      <div class="input-group">
        <label for="num1">First Number:</label>
        <input type="number" id="num1" placeholder="Enter first number" />
      </div>

      <div class="input-group">
        <label for="operator">Operator:</label>
        <select id="operator">
          <option value="+">+ (Addition)</option>
          <option value="-">- (Subtraction)</option>
          <option value="*">* (Multiplication)</option>
          <option value="/">/ (Division)</option>
          <option value="**">** (Exponent)</option>
        </select>
      </div>

      <div class="input-group">
        <label for="num2">Second Number:</label>
        <input type="number" id="num2" placeholder="Enter second number" />
      </div>

      <button onclick="calculate()">Calculate</button>

      <div class="result" id="result"></div>

      <div class="warning">
        ⚠️ Warning: This calculator is intentionally faulty!
      </div>
    </div>

    <script src="index.js"></script>
  </body>
</html>
