<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Statically Served Page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Welcome to my Static Page!</h1>
        <p>This file is being served automatically from the <code>public</code> folder by Express.</p>
        <p>You didn't have to create a custom <code>app.get()</code> route for this specific file!</p>
        <a href="/">Go back to Dynamic Home</a>
    </div>
</body>

</html>
