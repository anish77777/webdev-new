    <h1>JavaScript Variables</h1>
    <p>Variables are containers for storing data values.</p>

    <h2>Three ways to define variables:</h2>
    <ul>
      <li><strong>var</strong> - old way (function scoped)</li>
      <li><strong>let</strong> - modern way (block scoped)</li>
      <li><strong>const</strong> - constant (cannot be changed)</li>
    </ul>
