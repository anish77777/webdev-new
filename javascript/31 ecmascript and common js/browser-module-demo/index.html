<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ES Modules in Browser</title>
    <style>
        body {
            font-family: sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100-vh;
        }

        .card {
            background: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #f0db4f;
        }
    </style>
</head>

<body>
    <div class="card">
        <h1>ES Modules Demo</h1>
        <p id="output">Loading module data...</p>
    </div>

    <!-- 
      CRITICAL: We use type="module" here.
      This allows us to use 'import' and 'export' directly in the browser!
    -->
    <script type="module" src="app.js"></script>
</body>

</html>
