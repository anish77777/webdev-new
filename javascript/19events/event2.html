<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Demo | Premium Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --card-bg: #1a1a1e;
            --accent-primary: #00f2ff;
            --accent-secondary: #ff007a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a5;
            --border-color: #333338;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0d0d0f 100%);
        }

        .container {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 3rem;
            border-radius: 32px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        button {
            padding: 1rem 2rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-size: 0.9rem;
        }

        #ael-btn {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent-primary);
            border: 1px solid var(--accent-primary);
        }

        #ael-btn:hover {
            background: var(--accent-primary);
            color: var(--bg-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
        }

        #cl-btn {
            background: rgba(255, 0, 122, 0.1);
            color: var(--accent-secondary);
            border: 1px solid var(--accent-secondary);
        }

        #cl-btn:hover {
            background: var(--accent-secondary);
            color: var(--text-primary);
            box-shadow: 0 0 20px rgba(255, 0, 122, 0.4);
        }

        #event-log {
            background: #000;
            border-radius: 16px;
            padding: 1.5rem;
            height: 200px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            text-align: left;
            border: 1px solid var(--border-color);
        }

        .log-entry {
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            border-left: 2px solid var(--accent-primary);
            padding-left: 0.5rem;
        }

        @keyframes pulse-text {
            0% {
                transform: scale(1);
                opacity: 0.5;
            }

            50% {
                transform: scale(1.05);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Event Inspector v2</h1>

        <div class="button-group">
            <button id="ael-btn">addEventListener (ael)</button>
            <button id="cl-btn">onclick Property (cl)</button>
        </div>

        <div id="event-log">
            <div class="log-entry" style="border-color: #555;">Waiting for events...</div>
        </div>
    </div>

    <script src="event2.js"></script>
</body>

</html>
