<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyboard Event Inspector | Premium Suite</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0d0f;
            --card-bg: #1a1a1e;
            --accent-color: #00f2ff;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a5;
            --border-color: #333338;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #0d0d0f 100%);
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 2rem;
            text-align: center;
        }

        h1 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .main-display {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 4rem 2rem;
            box-shadow: var(--shadow);
            margin-bottom: 2rem;
            position: relative;
            transition: transform 0.1s ease;
        }

        .main-display.pulse {
            animation: pulse-border 0.2s ease-out;
        }

        @keyframes pulse-border {
            0% {
                border-color: var(--border-color);
                transform: scale(1);
            }

            50% {
                border-color: var(--accent-color);
                transform: scale(1.02);
            }

            100% {
                border-color: var(--border-color);
                transform: scale(1);
            }
        }

        #main-key {
            font-size: 6rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
        }

        .instruction {
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .detail-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            border-radius: 16px;
            text-align: left;
        }

        .detail-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .detail-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            color: var(--text-primary);
        }

        #meta-keys {
            margin-top: 2rem;
            display: flex;
            gap: 0.5rem;
            justify-content: center;
        }

        .meta-badge {
            background: var(--accent-color);
            color: var(--bg-color);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            animation: slide-up 0.3s ease-out;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .footer {
            margin-top: 4rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Keyboard Inspector</h1>

        <div class="main-display">
            <div id="main-key">?</div>
            <p class="instruction">Press any key to inspect its properties</p>
        </div>

        <div class="details-grid">
            <div class="detail-card">
                <span class="detail-label">event.key</span>
                <span class="detail-value" id="key-value">-</span>
            </div>
            <div class="detail-card">
                <span class="detail-label">event.code</span>
                <span class="detail-value" id="code-value">-</span>
            </div>
            <div class="detail-card">
                <span class="detail-label">event.location</span>
                <span class="detail-value" id="location-value">-</span>
            </div>
            <div class="detail-card">
                <span class="detail-label">event.which</span>
                <span class="detail-value" id="which-value">-</span>
            </div>
        </div>

        <div id="meta-keys"></div>

        <div class="footer">
            Premium Web Suite | Interactive Event Debugging
        </div>
    </div>

    <script src="keyboard.js"></script>
</body>

</html>
