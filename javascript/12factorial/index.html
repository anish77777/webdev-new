<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body>


    <script>
      let a =prompt("enter ur number");
    //   by reduce
    const element=[];
    for (let index = 0; index < a; index++) {
        element.push(index+1);
    }
    console.log(element);

    let factorial=element.reduce((a,v)=>a*v);
    console.log(factorial);

    //by for loop
    let b=7;
    let sum=1;
    for (let index = 1; index <= b; index++) {
        sum=index*sum; 
    }
    console.log(sum);
    </script>
</body>
