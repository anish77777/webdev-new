<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chilly Scenes | CSS Penguin</title>
    <link rel="stylesheet" href="./styles.css" />
    <!-- Importing a clean sans-serif font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Background elements to set the scene -->
    <div class="left-mountain"></div>
    <div class="back-mountain"></div>
    <div class="sun"></div>

    <!-- The main Penguin illustration container -->
    <div class="penguin">
        <!-- Head and facial features -->
        <div class="penguin-head">
            <div class="face left"></div>
            <div class="face right"></div>
            <div class="chin"></div>
            <div class="eye left">
                <div class="eye-lid"></div>
            </div>
            <div class="eye right">
                <div class="eye-lid"></div>
            </div>
            <div class="blush left"></div>
            <div class="blush right"></div>
            <div class="beak top"></div>
            <div class="beak bottom"></div>
        </div>

        <!-- Decorative shirt with text overlay -->
        <div class="shirt">
            <div>💜</div>
            <p>I CSS</p>
        </div>

        <!-- Body, appendages, and feet -->
        <div class="penguin-body">
            <div class="arm left"></div>
            <div class="arm right"></div>
            <div class="foot left"></div>
            <div class="foot right"></div>
        </div>
    </div>

    <!-- Foreground ground element -->
    <div class="ground"></div>
</body>

</html>
