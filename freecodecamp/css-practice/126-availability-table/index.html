<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Availability Table | Midnight Obsidian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Team <span class="accent-text">Availability</span></h1>
            <p>Weekly sync coordination dashboard</p>
        </header>

        <main>
            <div class="table-wrapper glass-card">
                <table>
                    <thead>
                        <tr>
                            <th class="corner">Time</th>
                            <th>Monday</th>
                            <th>Tuesday</th>
                            <th>Wednesday</th>
                            <th>Thursday</th>
                            <th>Friday</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="sharp">
                            <th class="time">09:00 AM</th>
                            <td class="available-5"></td>
                            <td class="available-4"></td>
                            <td class="available-2"></td>
                            <td class="available-0"></td>
                            <td class="available-1"></td>
                        </tr>
                        <tr class="half">
                            <th class="time">10:00 AM</th>
                            <td class="available-3"></td>
                            <td class="available-5"></td>
                            <td class="available-5"></td>
                            <td class="available-2"></td>
                            <td class="available-3"></td>
                        </tr>
                        <tr class="sharp">
                            <th class="time">11:00 AM</th>
                            <td class="available-1"></td>
                            <td class="available-2"></td>
                            <td class="available-4"></td>
                            <td class="available-5"></td>
                            <td class="available-4"></td>
                        </tr>
                        <tr class="half">
                            <th class="time">12:00 PM</th>
                            <td class="available-0"></td>
                            <td class="available-1"></td>
                            <td class="available-3"></td>
                            <td class="available-1"></td>
                            <td class="available-2"></td>
                        </tr>
                        <tr class="sharp">
                            <th class="time">01:00 PM</th>
                            <td class="available-4"></td>
                            <td class="available-3"></td>
                            <td class="available-5"></td>
                            <td class="available-4"></td>
                            <td class="available-5"></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div id="legend" class="glass-card">
                <span>Availability</span>
                <div id="legend-gradient"></div>
                <div class="legend-labels">
                    <span>Low</span>
                    <span>High</span>
                </div>
            </div>
        </main>
    </div>
</body>

</html>
